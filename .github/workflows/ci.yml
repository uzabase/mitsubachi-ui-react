name: CI

on: push

jobs:
  test:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 25
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run format:check
      - run: npm run format:lint
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
